<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NX7</title>
    <!-- Link to intro page CSS -->
    <link rel="stylesheet" href="../../css/intro.css">
</head>
<body>

<div class="introContainer">

    <!-- Logo Area with Ripple Animation -->
    <div class="logoArea">
        <div class="ripple"></div>
        <img src="../../images/NX7-horizontal.png" alt="NX7 Logo" class="introLogo">
    </div>

    <!-- Welcome Text -->
    <h1 class="welcomeText">Welcome to NX7</h1>

    <!-- Tagline -->
    <p class="tagline">• Fast. Smart. Secure.</p>

    <!-- Progress Bar -->
    <div class="progressBarContainer">
        <div class="progressBar"></div>
    </div>

    <!-- Optional percentage text -->
    <div class="loadingPercent"></div>

    <!-- Loading message -->
    <div class="loadingMessage"></div>

    <!-- Footer -->
    <div class="introFooter">
        Powered by DB7
    </div>

</div>

<!-- Startup Sound -->
<audio id="introSound" src="../../images/nx7-intro.mp3" preload="auto" autoplay></audio>

<!-- Intro JS -->
<script src="../../js/intro.js"></script>

</body>
</html>
