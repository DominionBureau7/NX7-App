<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NX7</title>

<!-- Page CSS -->
<link rel="stylesheet" href="../../css/launch.css">

<!-- Font Awesome for icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

</head>
<body>

<div class="launchContainer">

    <!-- Logo Area -->
    <div class="logoArea">
        <img src="../../images/NX7-horizontal.png" alt="NX7 Logo" class="launchLogo">
    </div>

    <!-- Open App Button -->
    <div class="launchAction">
        <button id="openNX7" class="openButton">
            Tap to Open NX7
        </button>
    </div>

    <!-- Volume Recommendation Message -->
    <div class="volumeNote">
        Increase your device volume for the best experience!
        <i class="fa-regular fa-face-grin-wink"></i>
    </div>

</div>

<!-- JS for button functionality -->
<script src="../../js/launch.js"></script>

</body>
</html>
